# This Blueprint creates the web service, PostgreSQL database, and persistent
# upload disk as one reproducible deployment. Secret values are generated by
# Render and are never stored in the repository.
databases:
  - name: p-kids-events-db
    plan: basic-256mb
    databaseName: pkidsevents
    user: pkidsevents
    region: frankfurt
    ipAllowList: []

services:
  - type: web
    name: p-kids-events
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: ./build.sh
    startCommand: python -m gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers ${WEB_CONCURRENCY:-1}
    healthCheckPath: /
    disk:
      name: media
      mountPath: /opt/render/project/src/media
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: p-kids-events-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_TRUST_PROXY_SSL_HEADER
        value: "True"
      - key: DJANGO_SECURE_SSL_REDIRECT
        value: "True"
      - key: DJANGO_SECURE_HSTS_SECONDS
        value: "3600"
      - key: DJANGO_SERVE_MEDIA
        value: "True"
      - key: DJANGO_MEDIA_ROOT
        value: /opt/render/project/src/media
